apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-topics
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Chart.Name }}-topics
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-topics
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.28
        command:
        - sh
        - -c
        - |
          echo "Waiting for Kafka to be ready..."
          until nc -z {{ .Release.Name }}-kafka {{ .Values.service.port }}; do
            echo "Kafka not ready yet..."
            sleep 5
          done
          echo "Kafka is ready!"
          sleep 30  # Esperar un poco más
      
      containers:
      - name: create-topics
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - sh
        - -c
        - |
          {{- range .Values.config.topics }}
          echo "Creating topic: {{ .name }}"
          kafka-topics --bootstrap-server {{ $.Release.Name }}-kafka:{{ $.Values.service.port }} \
            --create \
            --if-not-exists \
            --topic {{ .name }} \
            --partitions {{ .partitions }} \
            --replication-factor {{ .replicationFactor }} \
            --config retention.ms=86400000 || echo "Topic might exist"
          {{- end }}
          
          echo "Listing all topics:"
          kafka-topics --bootstrap-server {{ $.Release.Name }}-kafka:{{ $.Values.service.port }} --list
          
          echo "Topics created successfully!"