apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: kafka
spec:
  serviceName: {{ .Release.Name }}-{{ .Chart.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      initContainers:
      # Init container para formatear storage con KRaft
      - name: {{ .Chart.Name }}-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - sh
        - -c
        - |
          # Formatear el directorio de logs con KRaft si no existe
          if [ ! -f /var/lib/kafka/data/meta.properties ]; then
            echo "Formatting Kafka storage with KRaft..."
            kafka-storage format \
              -t {{ .Values.kraft.clusterId }} \
              -c /etc/kafka/kraft.properties
          else
            echo "Kafka storage already formatted"
          fi
        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data
        - name: config
          mountPath: /etc/kafka
        env:
        - name: CLUSTER_ID
          value: "{{ .Values.kraft.clusterId }}"
      
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: {{ .Chart.Name }}
        - containerPort: 9093
          name: controller
        
        env:
        # ========== KRAFT MODE (SIN ZOOKEEPER) ==========
        - name: KAFKA_NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        
        - name: CLUSTER_ID
          value: "{{ .Values.kraft.clusterId }}"
        
        # Kafka actúa como broker Y controller (combined mode)
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "0@{{ .Release.Name }}-kafka-0.{{ .Release.Name }}-kafka-headless.{{ .Values.global.namespace }}.svc.cluster.local:9093"
        
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        
        # ========== LISTENERS ==========
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:{{ .Values.service.port }},CONTROLLER://0.0.0.0:9093"
        
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://{{ .Release.Name }}-kafka.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.service.port }}"
        
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
        
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        
        # ========== CONFIGURACIÓN BÁSICA ==========
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "{{ .Values.config.replicationFactor }}"
        
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "{{ .Values.config.replicationFactor }}"
        
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        
        - name: KAFKA_DEFAULT_REPLICATION_FACTOR
          value: "{{ .Values.config.replicationFactor }}"
        
        - name: KAFKA_NUM_PARTITIONS
          value: "{{ .Values.config.numPartitions }}"
        
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "false"
        
        # ========== OPTIMIZACIÓN DE RECURSOS ==========
        - name: KAFKA_HEAP_OPTS
          value: "-Xms256m -Xmx512m"  # Heap reducido
        
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "24"  # Solo 24 horas en dev
        
        - name: KAFKA_LOG_SEGMENT_BYTES
          value: "536870912"  # 512MB (reducido de 1GB)
        
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"
        
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data
        - name: config
          mountPath: /etc/kafka
        {{- end }}
        
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        
        livenessProbe:
          tcpSocket:
            port: kafka
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          tcpSocket:
            port: kafka
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      
      volumes:
      - name: config
        emptyDir: {}
  
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.persistence.storageClass }}
      storageClassName: {{ .Values.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
  {{- end }}
