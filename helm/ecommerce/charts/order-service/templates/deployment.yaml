apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.global.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.28
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for Cloud Config..."
              until wget -qO- http://my-ecommerce-cloud-config:9296/actuator/health > /dev/null 2>&1; do
                echo "Cloud Config not ready yet..."
                sleep 5
              done
              echo "✔ Cloud Config is UP!"

              echo "⏳ Waiting for Eureka..."
              until nc -z my-ecommerce-service-discovery 8761; do
                echo "Eureka not ready yet..."
                sleep 5
              done
              echo "✔ Eureka is UP!"
              
              echo "⏳ Waiting for Kafka..."
              until nc -z my-ecommerce-kafka.kafka.svc.cluster.local 9092; do
                echo "Kafka not ready yet..."
                sleep 5
              done
              echo "✔ Kafka is UP!"
              
              echo "✔ All dependencies are ready!"

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.port }}
          {{- if or .Values.config .Values.secrets }}
          envFrom:
            {{- if .Values.config }}
            - configMapRef:
                name: {{ .Release.Name }}-{{ .Chart.Name }}-config
            {{- end }}
            {{- if .Values.secrets }}
            - secretRef:
                name: {{ .Release.Name }}-{{ .Chart.Name }}-secret
            {{- end }}
          {{- end }}
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "classpath:/,file:/config/application.yml"
          volumeMounts:
            - name: app-config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /order-service/actuator/health/liveness
              port: {{ .Values.service.port }}
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /order-service/actuator/health/readiness
              port: {{ .Values.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

      volumes:
        - name: app-config
          configMap:
            name: {{ .Release.Name }}-{{ .Chart.Name }}-config
            items:
              - key: application.yml
                path: application.yml