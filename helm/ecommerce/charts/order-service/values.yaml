service:
  type: ClusterIP
  port: 8300

# Configuración no sensible
config:
  springZipkinBaseUrl: "http://my-ecommerce-zipkin:9411"
  springConfigImport: "configserver:http://my-ecommerce-cloud-config:9296/"
  eurekaClientRegion: default
  eurekaClientAvailabilityZonesDefault: myzone
  eurekaClientServiceUrlMyZone: "http://my-ecommerce-service-discovery:8761/eureka"
  eurekaClientServiceUrlDefaultZone: "http://my-ecommerce-service-discovery:8761/eureka"
  eurekaInstancePreferIpAddress: "true"

#Sprintboot Configuration for kafka
applicationConfig: |
  spring:
    application:
      name: order-service
    
    kafka:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      
      consumer:
        group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:order-service-group}
        auto-offset-reset: earliest
        enable-auto-commit: false
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.trusted.packages: "*"
          spring.json.value.default.type: com.selimhorri.app.dto.OrderEvent
          session.timeout.ms: 30000
          heartbeat.interval.ms: 10000
          max.poll.records: 100
          max.poll.interval.ms: 300000
      
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        acks: all
        retries: 3
        properties:
          compression.type: snappy
          linger.ms: 10
          batch.size: 16384
      
      listener:
        ack-mode: manual
        concurrency: 3
        type: batch

  kafka:
    topics:
      orders: ${KAFKA_TOPIC_ORDERS:order-events}
      payments: payment-events
      shipping: shipping-events
      products: product-events

  logging:
    level:
      org.apache.kafka: INFO
      org.springframework.kafka: DEBUG

  ---
  spring:
    config:
      activate:
        on-profile: local
    kafka:
      bootstrap-servers: localhost:9092

  ---
  spring:
    config:
      activate:
        on-profile: dev
    kafka:
      bootstrap-servers: my-ecommerce-kafka.kafka.svc.cluster.local:9092

  ---
  spring:
    config:
      activate:
        on-profile: prod
    kafka:
      bootstrap-servers: my-ecommerce-kafka.kafka.svc.cluster.local:9092
      consumer:
        enable-auto-commit: false
        max-poll-records: 50
      producer:
        acks: all
        retries: 5

stable:
  image:
    repository: "barcino/order-service"
    tag: "latest"
  replicaCount: 1
  
canary:
  image:
    repository: "barcino/order-service"
    tag: "latest"
  replicaCount: 0 
