global:
  namespace: kafka
replicaCount: 1

image:
  repository: "apache/kafka"
  tag: "3.9.1"
  imagePullPolicy: IfNotPresent


zookeeper:
  enabled: false  # ← Ya no necesitamos Zookeeper

# Habilitar modo KRaft
kraft:
  enabled: true
  clusterId: "MkU3OEVBNTcwNTJENDM2Qk"  # ID único del cluster (genera uno con uuidgen)

service:
  type: ClusterIP
  port: 9092

# Reducir persistencia
persistence:
  enabled: true
  storageClass: ""
  size: 2Gi  # ← Reducido de 10Gi a 2Gi

config:
  numPartitions: 2  # ← Reducido de 3 a 2
  replicationFactor: 1  # ← Ya estaba en 1
  topics:
    - name: order-events
      partitions: 3  # ← Reducido de 6 a 3
      replicationFactor: 1
    - name: payment-events
      partitions: 3
      replicationFactor: 1
    - name: shipping-events
      partitions: 3
      replicationFactor: 1
    - name: product-events
      partitions: 2
      replicationFactor: 1

# RECURSOS ULTRA REDUCIDOS
resources:
  limits:
    cpu: 500m      
    memory: 768Mi  
  requests:
    cpu: 250m      
    memory: 512Mi  

livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6