apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}"
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  serviceName: "{{ .Release.Name }}-{{ .Chart.Name }}-headless"
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      initContainers:
        - name: kafka-format-storage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              set -e

              echo "Checking if storage already formatted..."

              if [ -f /var/lib/kafka/data/meta.properties ]; then
                echo "Storage already formatted"
                cat /var/lib/kafka/data/meta.properties
                exit 0
              fi

              echo "Formatting storage..."
              /opt/kafka/bin/kafka-storage.sh format \
                -t {{ .Values.kraft.clusterId }} \
                -c /tmp/kraft-config/server.properties

              echo "KRaft storage formatted OK!"

          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: kafka-config
              mountPath: /tmp/kraft-config
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/kraft-config/server.properties
          ports:
            - containerPort: {{ .Values.service.port }}
              name: {{ .Chart.Name }}
            - containerPort: 9093
              name: controller
          env:
            - name: CLUSTER_ID
              value: "{{ .Values.kraft.clusterId }}"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_NODE_ID
              value: "0"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@{{ .Release.Name }}-{{ .Chart.Name }}-0.{{ .Release.Name }}-{{ .Chart.Name }}-headless.{{ .Values.global.namespace }}.svc.cluster.local:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:{{ .Values.service.port }},CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://{{ .Release.Name }}-{{ .Chart.Name }}.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.service.port }}"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: kafka-config
              mountPath: /tmp/kraft-config
      volumes:
        - name: kafka-config
          configMap:
            name: "{{ .Release.Name }}-{{ .Chart.Name }}-config"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
